<mat-sidenav-container class="admin-layout-container">
  
  <!-- Sidebar -->
  <mat-sidenav #sidenav mode="side" opened class="glass-sidenav">
    <div class="sidenav-header">
      <div class="logo">
        <mat-icon>hotel</mat-icon>
        <span>Antigravity</span>
      </div>
      <p class="subtitle">Hotel Manager</p>
    </div>

    <mat-nav-list class="nav-menu">
      <a mat-list-item *ngFor="let item of filteredMenu" [routerLink]="item.route" routerLinkActive="active-route">
        <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
        <span matListItemTitle>{{ item.label }}</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <!-- Main Content Area -->
  <mat-sidenav-content class="main-content">
    
    <!-- Topbar -->
    <mat-toolbar class="glass-toolbar">
      <button mat-icon-button (click)="sidenav.toggle()" aria-label="Toggle sidenav" class="toggle-btn">
        <mat-icon>menu</mat-icon>
      </button>

      <span class="spacer"></span>

      <!-- User Info Dropdown -->
      <div class="user-info-topbar">
        <div class="avatar-small">{{ userName.charAt(0).toUpperCase() }}</div>
        <div class="user-details-small">
          <span class="name-small">{{ userName }}</span>
          <span class="role-small">{{ userRole }}</span>
        </div>
      </div>

      <!-- Notification Bell -->
      <button mat-icon-button class="notification-btn" [class.ringing]="isRinging" (click)="clearNotifications()">
        <mat-icon [attr.aria-hidden]="'false'" [matBadge]="notificationCount > 0 ? notificationCount : null" matBadgeColor="warn">
          notifications
        </mat-icon>
      </button>

      <!-- Logout -->
      <button mat-icon-button class="logout-btn" (click)="logout()" matTooltip="Logout">
        <mat-icon>logout</mat-icon>
      </button>
    </mat-toolbar>

    <!-- Router Outlet for Child Pages -->
    <div class="router-wrapper">
      <router-outlet></router-outlet>
    </div>

  </mat-sidenav-content>

</mat-sidenav-container>
