<div class="category-wrapper">
  <div class="header-section">
    <div>
      <h2>Quản lý Gói giá (Rate Plans)</h2>
      <p>Cấu hình các chính sách giá và hủy phòng</p>
    </div>
    <button mat-flat-button class="add-btn" (click)="openEditDialog()">
      <mat-icon>add</mat-icon> Thêm Gói Giá
    </button>
  </div>

  <mat-card class="glass-card">
    <table mat-table [dataSource]="dataSource" class="premium-table">
      <!-- Name Column -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef> Tên Gói Giá </th>
        <td mat-cell *matCellDef="let element"> {{element.name}} </td>
      </ng-container>

      <!-- Price Column -->
      <ng-container matColumnDef="price">
        <th mat-header-cell *matHeaderCellDef> Giá (VND) </th>
        <td mat-cell *matCellDef="let element"> <span class="price-tag">{{element.price | currency:'VND'}}</span> </td>
      </ng-container>

      <!-- Policy Column -->
      <ng-container matColumnDef="cancellationPolicy">
        <th mat-header-cell *matHeaderCellDef> Chính sách hủy </th>
        <td mat-cell *matCellDef="let element"> {{element.cancellationPolicy}} </td>
      </ng-container>

      <!-- Status Column -->
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef> Trạng thái </th>
        <td mat-cell *matCellDef="let element">
          <span class="status-chip" [class.active]="element.isActive">{{element.isActive ? 'Hoạt động' : 'Đã khóa'}}</span>
        </td>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="text-right"> Thao tác </th>
        <td mat-cell *matCellDef="let element" class="text-right">
          <button mat-icon-button color="primary" (click)="openEditDialog(element)">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="deletePlan(element.ratePlanId, element.name)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="table-row"></tr>
    </table>

    <div *ngIf="dataSource.length === 0 && !isLoading" class="empty-state">
      <mat-icon>inbox</mat-icon>
      <p>Chưa có gói giá nào.</p>
    </div>
  </mat-card>
</div>
