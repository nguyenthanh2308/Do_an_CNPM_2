<div class="login-container">
  <div class="login-glass-card">
    
    <div class="logo-header">
      <div class="icon-wrapper">
        <mat-icon>domain</mat-icon>
      </div>
      <h1>Welcome Back</h1>
      <p>Log in to Antigravity Hotel Manager</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      
      <div *ngIf="errorMessage" class="error-banner">
        <mat-icon style="vertical-align: middle; margin-right: 4px; font-size: 20px; width: 20px; height: 20px;">error_outline</mat-icon>
        {{ errorMessage }}
      </div>

      <mat-form-field appearance="fill" class="glass-input">
        <mat-label>Email address</mat-label>
        <mat-icon matPrefix>email</mat-icon>
        <input matInput formControlName="email" type="email" placeholder="name@company.com" autocomplete="email">
        <mat-error *ngIf="loginForm.get('email')?.hasError('required')">Email is required</mat-error>
        <mat-error *ngIf="loginForm.get('email')?.hasError('email')">Invalid email format</mat-error>
      </mat-form-field>

      <mat-form-field appearance="fill" class="glass-input">
        <mat-label>Password</mat-label>
        <mat-icon matPrefix>lock</mat-icon>
        <input matInput formControlName="password" [type]="hidePassword ? 'password' : 'text'" placeholder="••••••••" autocomplete="current-password">
        <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword" [attr.aria-label]="'Hide password'" [attr.aria-pressed]="hidePassword">
          <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
        </button>
        <mat-error *ngIf="loginForm.get('password')?.hasError('required')">Password is required</mat-error>
        <mat-error *ngIf="loginForm.get('password')?.hasError('minlength')">Password must be at least 6 characters</mat-error>
      </mat-form-field>

      <button mat-flat-button class="submit-btn" type="submit" [disabled]="loginForm.invalid || isLoading">
        <span *ngIf="!isLoading">Sign In</span>
        <div *ngIf="isLoading" class="spinner-container">
          <mat-spinner diameter="24" color="accent"></mat-spinner>
        </div>
      </button>
    </form>

  </div>
</div>
